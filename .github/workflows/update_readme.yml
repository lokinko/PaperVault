name: Force Rebuild Cache and Update README

env:
  PYTHON_VERSION: "3.10"

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "更新模式: force (全量重建缓存并更新 README) 或 readme (仅更新 README)" 
        required: false
        default: "force"

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      TZ: Asia/Shanghai
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: Checkout with LFS
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chinese fonts
        run: |
          sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
          rm -rf ~/.cache/matplotlib

      - name: Run rebuild
        run: |
          if [ "${{ github.event.inputs.mode }}" == "readme" ]; then
            echo "[*] README-only mode"
            python maintain.py
          else
            echo "[*] Force rebuild mode"
            python maintain.py force
          fi

      - name: Setup GIT user
        run: |
          git config --local user.name "youngfish42"
          git config --local user.email "youngfish42@users.noreply.github.com"

      - name: Fetch latest main
        run: git fetch origin main

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(auto): force rebuild cache and update README"
          committer: youngfish42 <youngfish42@users.noreply.github.com>
          author: youngfish42 <youngfish42@users.noreply.github.com>
          title: "[Auto] Force rebuild cache and update README"
          body: |
            This PR was automatically generated by the `update_readme` workflow.

            It performs a full cache rebuild from all sources and updates the README conference list.
            Please review the changes before merging.

            ---
            *Maintained by [@youngfish42](https://github.com/youngfish42).*
            *For questions, please contact: im.young@foxmail.com*
          branch: auto-rebuild-cache
          delete-branch: true
