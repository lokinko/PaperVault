name: Discover and Update Conference Configs

env:
  PYTHON_VERSION: "3.10"

on:
  schedule:
    # 每天北京时间 02:00 (UTC 18:00) 运行 
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      start_year:
        description: "Start year for discovery (default: current year - 1)"
        required: false
        default: ""
      end_year:
        description: "End year for discovery (default: current year)"
        required: false
        default: ""

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      TZ: Asia/Shanghai
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache DBLP discovery results
        uses: actions/cache@v4
        with:
          path: cache/dblp_discovery_cache.json
          key: dblp-discovery-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            dblp-discovery-cache-${{ runner.os }}-

      - name: Run auto-discovery
        id: discover
        run: |
          START_ARG=""
          END_ARG=""
          if [ -n "${{ github.event.inputs.start_year }}" ]; then
            START_ARG="--start-year ${{ github.event.inputs.start_year }}"
          fi
          if [ -n "${{ github.event.inputs.end_year }}" ]; then
            END_ARG="--end-year ${{ github.event.inputs.end_year }}"
          fi
          python -m discovery.generate_conf $START_ARG $END_ARG --soft-timeout 18000
          echo "changed=$(git diff --name-only -- conf/ | wc -l)" >> "$GITHUB_OUTPUT"

      - name: Setup GIT user
        run: |
          git config --local user.name "youngfish42"
          git config --local user.email "youngfish42@users.noreply.github.com"

      - name: Fetch latest main
        run: git fetch origin main

      - name: Create Pull Request
        if: steps.discover.outputs.changed != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(auto): discover new conference configs"
          committer: youngfish42 <youngfish42@users.noreply.github.com>
          author: youngfish42 <youngfish42@users.noreply.github.com>
          title: "[Auto] Discover new conference configs"
          body: |
            This PR was automatically generated by the `discover_and_update` workflow.

            It adds newly discovered conference/year combinations to `conf/*.json`.
            Please review the URLs before merging.

            ---
            *Maintained by [@youngfish42](https://github.com/youngfish42).*
            *For questions, please contact: im.young@foxmail.com*
          branch: auto-discover-confs
          delete-branch: true
