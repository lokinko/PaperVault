name: Discover and Update Conference Configs

env:
  PYTHON_VERSION: "3.10"

on:
  schedule:
    # 每月 1 号 UTC 08:00 运行
    - cron: "0 8 1 * *"
  workflow_dispatch:
    inputs:
      start_year:
        description: "Start year for discovery (default: current year - 1)"
        required: false
        default: ""
      end_year:
        description: "End year for discovery (default: current year)"
        required: false
        default: ""

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run auto-discovery
        id: discover
        run: |
          START_ARG=""
          END_ARG=""
          if [ -n "${{ github.event.inputs.start_year }}" ]; then
            START_ARG="--start-year ${{ github.event.inputs.start_year }}"
          fi
          if [ -n "${{ github.event.inputs.end_year }}" ]; then
            END_ARG="--end-year ${{ github.event.inputs.end_year }}"
          fi
          python -m discovery.generate_conf $START_ARG $END_ARG
          echo "changed=$(git diff --name-only | grep '^conf/' | wc -l)" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.discover.outputs.changed != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(auto): discover new conference configs"
          title: "[Auto] Discover new conference configs"
          body: |
            This PR was automatically generated by the `discover_and_update` workflow.

            It adds newly discovered conference/year combinations to `conf/*.json`.
            Please review the URLs before merging.
          branch: auto-discover-confs
          delete-branch: true
