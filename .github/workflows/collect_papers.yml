name: Collect Papers

env:
  PYTHON_VERSION: "3.10"
  AUTO_COLLECT_BRANCH: "auto-collect-papers"
  AUTO_COLLECT_FILES: "cache/cache.jsonl.gz cache/collect_progress.json cache/collect_failures.json README.md"

on:
  schedule:
    # 每周一北京时间 03:00 (UTC 周日 19:00) 运行增量收集 
    - cron: "0 19 * * 0"
  workflow_dispatch:
    inputs:
      mode:
        description: "收集模式: incremental (默认增量) 或 force (全量重建)"
        required: false
        default: "incremental"
  push:
    branches:
      - main
    paths:
      - "conf/**"

concurrency:
  group: collect-papers
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      TZ: Asia/Shanghai
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: Checkout with LFS
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
          rm -rf ~/.cache/matplotlib

      - name: Restore in-progress auto collect state
        run: |
          write_hashes() {
            local output_file="$1"
            : > "$output_file"
            for file in ${{ env.AUTO_COLLECT_FILES }}; do
              if [ -f "$file" ]; then
                sha256sum "$file" >> "$output_file"
              else
                printf 'missing  %s\n' "$file" >> "$output_file"
              fi
            done
          }

          if git ls-remote --exit-code --heads origin "${{ env.AUTO_COLLECT_BRANCH }}" >/dev/null 2>&1; then
            git fetch --no-tags origin "${{ env.AUTO_COLLECT_BRANCH }}"
            for file in ${{ env.AUTO_COLLECT_FILES }}; do
              if git cat-file -e "origin/${{ env.AUTO_COLLECT_BRANCH }}:$file" 2>/dev/null; then
                git checkout "origin/${{ env.AUTO_COLLECT_BRANCH }}" -- "$file"
              else
                echo "Skip missing tracked file from ${{ env.AUTO_COLLECT_BRANCH }}: $file"
              fi
            done
            echo "Restored latest auto collect state from ${{ env.AUTO_COLLECT_BRANCH }}."
          else
            echo "No existing auto collect branch found; starting from main."
          fi

          write_hashes "$RUNNER_TEMP/collect_baseline.sha256"

      - name: Run paper collection
        run: |
          if [ "${{ github.event.inputs.mode }}" == "force" ]; then
            echo "[*] Force mode: full cache rebuild"
            python maintain.py force
          else
            echo "[*] Incremental mode: collecting only missing conferences"
            python maintain.py collect --soft-timeout 18000
          fi

      - name: Check for changes
        id: check_changes
        run: |
          : > "$RUNNER_TEMP/collect_current.sha256"
          for file in ${{ env.AUTO_COLLECT_FILES }}; do
            if [ -f "$file" ]; then
              sha256sum "$file" >> "$RUNNER_TEMP/collect_current.sha256"
            else
              printf 'missing  %s\n' "$file" >> "$RUNNER_TEMP/collect_current.sha256"
            fi
          done

          if ! cmp --silent "$RUNNER_TEMP/collect_baseline.sha256" "$RUNNER_TEMP/collect_current.sha256"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup GIT user
        run: |
          git config --local user.name "youngfish42"
          git config --local user.email "youngfish42@users.noreply.github.com"

      - name: Fetch latest main
        run: git fetch origin main

      - name: Create Pull Request
        if: steps.check_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(auto): collect papers for new conferences"
          committer: youngfish42 <youngfish42@users.noreply.github.com>
          author: youngfish42 <youngfish42@users.noreply.github.com>
          title: "[Auto] Collect papers for new conferences"
          body: |
            This PR was automatically generated by the `collect_papers` workflow.

            It incrementally collects paper metadata for newly discovered conferences
            and updates the README conference list.
            Please review the changes before merging.

            ---
            *Maintained by [@youngfish42](https://github.com/youngfish42).*
            *For questions, please contact: im.young@foxmail.com*
          branch: ${{ env.AUTO_COLLECT_BRANCH }}
          delete-branch: false
