name: Backfill Abstracts

env:
  PYTHON_VERSION: "3.10"
  AUTO_BACKFILL_BRANCH: "auto-backfill-abstracts"
  AUTO_BACKFILL_FILES: "cache/cache.jsonl.gz cache/abstract_backfill_progress.json docs/abstract_backfill_progress.md"

on:
  schedule:
    # 每天运行1次，每次处理最多 6000 篇最高优先级论文 
     - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      target_conf:
        description: "手动指定 conf（如 AAAI2020），留空则自动处理最多 6000 篇最高优先级论文"
        required: false
        default: ""

concurrency:
  group: backfill-abstracts
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      TZ: Asia/Shanghai
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: Checkout with LFS
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore in-progress auto backfill state
        run: |
          write_hashes() {
            local output_file="$1"
            : > "$output_file"
            for file in ${{ env.AUTO_BACKFILL_FILES }}; do
              if [ -f "$file" ]; then
                sha256sum "$file" >> "$output_file"
              else
                printf 'missing  %s\n' "$file" >> "$output_file"
              fi
            done
          }

          if git ls-remote --exit-code --heads origin "${{ env.AUTO_BACKFILL_BRANCH }}" >/dev/null 2>&1; then
            git fetch --no-tags origin "${{ env.AUTO_BACKFILL_BRANCH }}"
            for file in ${{ env.AUTO_BACKFILL_FILES }}; do
              if git cat-file -e "origin/${{ env.AUTO_BACKFILL_BRANCH }}:$file" 2>/dev/null; then
                git checkout "origin/${{ env.AUTO_BACKFILL_BRANCH }}" -- "$file"
              else
                echo "Skip missing tracked file from ${{ env.AUTO_BACKFILL_BRANCH }}: $file"
              fi
            done
            echo "Restored latest auto backfill state from ${{ env.AUTO_BACKFILL_BRANCH }}."
          else
            echo "No existing auto backfill branch found; starting from main."
          fi

          write_hashes "$RUNNER_TEMP/backfill_baseline.sha256"

      - name: Run abstract backfill
        run: |
          if [ -n "${{ github.event.inputs.target_conf }}" ]; then
            python scripts/fetch_abstracts.py --conf "${{ github.event.inputs.target_conf }}" --chunk-size 500 --soft-timeout 18000 --max-failed-attempts 3
          else
            python scripts/fetch_abstracts.py --batch --max-papers 6000 --chunk-size 500 --soft-timeout 18000 --max-failed-attempts 3
          fi

      - name: Check for changes
        id: check_changes
        run: |
          : > "$RUNNER_TEMP/backfill_current.sha256"
          for file in ${{ env.AUTO_BACKFILL_FILES }}; do
            if [ -f "$file" ]; then
              sha256sum "$file" >> "$RUNNER_TEMP/backfill_current.sha256"
            else
              printf 'missing  %s\n' "$file" >> "$RUNNER_TEMP/backfill_current.sha256"
            fi
          done

          if ! cmp --silent "$RUNNER_TEMP/backfill_baseline.sha256" "$RUNNER_TEMP/backfill_current.sha256"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup GIT user
        run: |
          git config --local user.name "youngfish42"
          git config --local user.email "youngfish42@users.noreply.github.com"

      - name: Fetch latest main
        run: git fetch origin main

      - name: Create Pull Request
        if: steps.check_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(auto): backfill abstracts"
          committer: youngfish42 <youngfish42@users.noreply.github.com>
          author: youngfish42 <youngfish42@users.noreply.github.com>
          title: "[Auto] Backfill paper abstracts"
          body: |
            This PR was automatically generated by the `backfill_abstracts` workflow.

            It backfills abstracts for up to 6000 highest-priority papers across conferences/journals,
            continuing from the latest in-progress auto-backfill branch state.
            Please review the changes before merging.

            ---
            *Maintained by [@youngfish42](https://github.com/youngfish42).*
            *For questions, please contact: im.young@foxmail.com*
          branch: ${{ env.AUTO_BACKFILL_BRANCH }}
          delete-branch: false
