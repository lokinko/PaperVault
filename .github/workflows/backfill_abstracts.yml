name: Backfill Abstracts

env:
  PYTHON_VERSION: "3.10"

on:
  schedule:
    # 每 8 小时运行一次（UTC 00:00, 08:00, 16:00）
    - cron: "0 */8 * * *"
  workflow_dispatch:
    inputs:
      target_conf:
        description: "手动指定 conf（如 AAAI2020），留空则自动选择优先级最高的"
        required: false
        default: ""

concurrency:
  group: backfill-abstracts
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      TZ: Asia/Shanghai
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout with LFS
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run abstract backfill
        run: |
          if [ -n "${{ github.event.inputs.target_conf }}" ]; then
            python scripts/fetch_abstracts.py --conf "${{ github.event.inputs.target_conf }}" --chunk-size 500
          else
            python scripts/fetch_abstracts.py --batch --top 1 --chunk-size 500
          fi

      - name: Check for changes
        id: check_changes
        run: |
          if [ -n "$(git diff --name-only)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup GIT user
        run: |
          git config --local user.name "youngfish42"
          git config --local user.email "youngfish42@users.noreply.github.com"

      - name: Create Pull Request
        if: steps.check_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(auto): backfill abstracts"
          committer: youngfish42 <youngfish42@users.noreply.github.com>
          author: youngfish42 <youngfish42@users.noreply.github.com>
          title: "[Auto] Backfill paper abstracts"
          body: |
            This PR was automatically generated by the `backfill_abstracts` workflow.

            It backfills abstracts for the highest-priority conference.
            Please review the changes before merging.

            ---
            *Maintained by [@youngfish42](https://github.com/youngfish42).*
            *For questions, please contact: im.young@foxmail.com*
          branch: auto-backfill-abstracts
          delete-branch: false
